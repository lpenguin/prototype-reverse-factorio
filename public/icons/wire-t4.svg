<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <!-- Canonical: cross — all 4 segments from center -->
  <!-- Casings first -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="#1e293b" stroke-width="20"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#1e293b" stroke-width="20"/>
  <!-- Cores on top -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="#d97706" stroke-width="8"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#d97706" stroke-width="8"/>
  <!-- Hub -->
  <circle cx="50" cy="50" r="10" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>
  <circle cx="50" cy="50" r="4" fill="#fbbf24"/>
</svg>