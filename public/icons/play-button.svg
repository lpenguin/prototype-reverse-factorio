<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <defs>
    <!-- Металлическая основа кнопки -->
    <linearGradient id="btn-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Свечение самого значка (Неоновый зеленый) -->
    <filter id="glow-play" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Тень от кнопки UI -->
    <filter id="ui-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Рамка кнопки -->
  <rect x="10" y="10" width="80" height="80" rx="16" fill="url(#btn-base)" stroke="#111" stroke-width="2" filter="url(#ui-shadow)" />
  
  <!-- Внутреннее углубление кнопки -->
  <rect x="14" y="14" width="72" height="72" rx="12" fill="#0f172a" stroke="#263238" stroke-width="2" />

  <!-- Сам значок PLAY (Смещен чуть правее для визуального баланса треугольника) -->
  <g filter="url(#glow-play)">
    <polygon points="38,30 70,50 38,70" fill="#22c55e" />
  </g>
</svg>