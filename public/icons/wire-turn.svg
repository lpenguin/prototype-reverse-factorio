<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.4" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Резиновый короб (изогнутый) -->
    <path d="M 50 100 L 50 70 Q 50 50 70 50 L 100 50" fill="none" stroke="#1e293b" stroke-width="16" stroke-linecap="square" />
    <!-- Обводка короба для объема -->
    <path d="M 42 100 L 42 70 Q 42 42 70 42 L 100 42" fill="none" stroke="#0f172a" stroke-width="2" />
    <path d="M 58 100 L 58 70 Q 58 58 70 58 L 100 58" fill="none" stroke="#0f172a" stroke-width="2" />

    <!-- Медный провод (изогнутый) -->
    <path d="M 50 100 L 50 70 Q 50 50 70 50 L 100 50" fill="none" stroke="#d97706" stroke-width="4" />
    
    <!-- Импульс сигнала на повороте -->
    <path d="M 50 85 L 50 70 Q 50 50 65 50" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" />

    <!-- Крепежная скоба на входе -->
    <rect x="44" y="80" width="12" height="12" rx="2" fill="#334155" stroke="#0f172a" stroke-width="2" transform="rotate(90, 50, 86)"/>
    
    <!-- Крепежная скоба на выходе -->
    <rect x="80" y="44" width="12" height="12" rx="2" fill="#334155" stroke="#0f172a" stroke-width="2" />
    
    <!-- Центральный болт-заглушка на самом сгибе -->
    <circle cx="58" cy="58" r="4" fill="#334155" stroke="#0f172a" stroke-width="1.5" />
    <circle cx="58" cy="58" r="1.5" fill="#94a3b8" />
  </g>
</svg>