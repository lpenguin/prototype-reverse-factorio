<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <!-- Микро-текстура бетона (шум) -->
    <pattern id="concrete-noise" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.5" fill="#3a4148" opacity="0.3" />
      <circle cx="12" cy="16" r="0.8" fill="#3a4148" opacity="0.2" />
      <circle cx="16" cy="8" r="0.5" fill="#5c6670" opacity="0.2" />
      <circle cx="8" cy="12" r="0.5" fill="#2d3339" opacity="0.4" />
    </pattern>
  </defs>

  <rect x="0" y="0" width="100" height="100" fill="#4B5563" />
  <rect x="0" y="0" width="100" height="100" fill="url(#concrete-noise)" />

  <!-- Рамка плиты (Светлый верх/лево, Темный низ/право для объема) -->
  <line x1="0" y1="1" x2="100" y2="1" stroke="#606A75" stroke-width="2" />
  <line x1="1" y1="0" x2="1" y2="100" stroke="#606A75" stroke-width="2" />
  <line x1="0" y1="99" x2="100" y2="99" stroke="#374151" stroke-width="2" />
  <line x1="99" y1="0" x2="99" y2="100" stroke="#374151" stroke-width="2" />

  <!-- Детали износа -->
  <!-- Скол в углу -->
  <path d="M 85 99 Q 90 92 99 90" fill="none" stroke="#2d3339" stroke-width="1.5" />
  <path d="M 86 100 Q 91 93 100 91" fill="none" stroke="#606A75" stroke-width="1" />
  
  <!-- Пара мелких выбоин-ямок -->
  <circle cx="20" cy="80" r="1.5" fill="#2d3339" opacity="0.6"/>
  <circle cx="70" cy="20" r="1" fill="#2d3339" opacity="0.5"/>
</svg>