<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <!-- Шаблон для желтой стрелки и металлических засечек (находится на стартовой оси) -->
    <!-- Центр поворота находится в координатах (100, 100) - правом нижнем углу -->
    <g id="curve-details">
      <!-- Направляющая желтая стрелка (изогнутая по радиусу движения) -->
      <path d="M 35 105 L 50 90 L 65 105" fill="none" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Засечки на металлическом бортике с внешнего радиуса -->
      <line x1="10" y1="100" x2="22" y2="100" stroke="#37474F" stroke-width="2" />
      <!-- Засечки на металлическом бортике с внутреннего радиуса -->
      <line x1="78" y1="100" x2="90" y2="100" stroke="#37474F" stroke-width="2" />
    </g>
  </defs>

  <!-- Внешний металлический бортик (Левый при входе снизу, Верхний при выходе вправо) -->
  <!-- Рисуем скругленный радиус от 10 (Внешний габарит) до 22 (Внутренний к ленте) -->
  <path d="M 10 100 A 90 90 0 0 1 100 10 L 100 22 A 78 78 0 0 0 22 100 Z" fill="#546E7A" />

  <!-- Внутренний металлический бортик (Правый при входе снизу, Нижний при выходе вправо) -->
  <path d="M 78 100 A 22 22 0 0 1 100 78 L 100 90 A 10 10 0 0 0 90 100 Z" fill="#546E7A" />

  <!-- Центральная резиновая лента конвейера -->
  <path d="M 22 100 A 78 78 0 0 1 100 22 L 100 78 A 22 22 0 0 0 78 100 Z" fill="#2a3036" />

  <!-- Тени для эффекта объема резиновой ленты (Темные канты по краям) -->
  <path d="M 22 100 A 78 78 0 0 1 100 22" fill="none" stroke="#1c2024" stroke-width="4" opacity="0.8" />
  <path d="M 78 100 A 22 22 0 0 1 100 78" fill="none" stroke="#1c2024" stroke-width="4" opacity="0.5" />

  <!-- Вставляем декорации (стрелки и стыки) под разными углами поворота -->
  <!-- Вращение происходит вокруг точки 100, 100 (правый нижний угол) -->
  <use href="#curve-details" transform="rotate(20, 100, 100)" />
  <use href="#curve-details" transform="rotate(45, 100, 100)" />
  <use href="#curve-details" transform="rotate(70, 100, 100)" />

</svg>