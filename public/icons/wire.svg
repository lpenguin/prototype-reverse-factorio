<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.4" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Основной резиновый короб кабеля -->
    <rect x="0" y="42" width="100" height="16" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
    
    <!-- Медный провод внутри -->
    <rect x="0" y="48" width="100" height="4" fill="#d97706" />
    
    <!-- Яркие световые импульсы сигнала -->
    <rect x="15" y="49" width="15" height="2" fill="#fbbf24" />
    <rect x="70" y="49" width="15" height="2" fill="#fbbf24" />

    <!-- Металлические крепежные скобы к полу -->
    <rect x="25" y="38" width="12" height="24" rx="2" fill="#334155" stroke="#0f172a" stroke-width="2"/>
    <circle cx="31" cy="42" r="1.5" fill="#94a3b8" />
    <circle cx="31" cy="58" r="1.5" fill="#94a3b8" />

    <rect x="63" y="38" width="12" height="24" rx="2" fill="#334155" stroke="#0f172a" stroke-width="2"/>
    <circle cx="69" cy="42" r="1.5" fill="#94a3b8" />
    <circle cx="69" cy="58" r="1.5" fill="#94a3b8" />
  </g>
</svg>