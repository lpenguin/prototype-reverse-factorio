<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <defs>
    <!-- Металлическая основа кнопки (та же самая) -->
    <linearGradient id="btn-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Свечение значка (Неоновый оранжевый/янтарный) -->
    <filter id="glow-pause" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Тень от кнопки UI -->
    <filter id="ui-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Рамка кнопки -->
  <rect x="10" y="10" width="80" height="80" rx="16" fill="url(#btn-base)" stroke="#111" stroke-width="2" filter="url(#ui-shadow)" />
  
  <!-- Внутреннее углубление -->
  <rect x="14" y="14" width="72" height="72" rx="12" fill="#0f172a" stroke="#263238" stroke-width="2" />

  <!-- Значок PAUSE (Две вертикальные полосы, строго по центру) -->
  <g filter="url(#glow-pause)">
    <rect x="34" y="30" width="10" height="40" rx="2" fill="#f59e0b" />
    <rect x="56" y="30" width="10" height="40" rx="2" fill="#f59e0b" />
  </g>
</svg>