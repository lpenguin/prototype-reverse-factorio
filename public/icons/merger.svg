  <circle
     cx="70.60479"
     cy="-15.68564"
     r="2"
     fill="#94a3b8"
     id="circle20"
     transform="rotate(90)" />
  <circle
     cx="135.60478"
     cy="-85.685638"
     r="2"
     fill="#94a3b8"
     id="circle21"
