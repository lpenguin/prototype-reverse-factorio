      <stop
         offset="50%"
         stop-color="#2a3036"
         id="stop2" />
      <stop
         offset="100%"
         stop-color="#1c2024"
         id="stop3" />
    </linearGradient>
    <!-- Градиент бронированного корпуса -->
    <linearGradient
