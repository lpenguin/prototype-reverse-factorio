<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reverse Factorio</title>
    <style>
      body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; font-family: sans-serif; }
      #app { background: #f0f0f0; display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
      #hud { position: absolute; top: 10px; left: 10px; padding: 10px; background: rgba(255, 255, 255, 0.8); border: 1px solid #aaa; border-radius: 4px; pointer-events: none; z-index: 100; }
      #menu-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
      #pause-menu { display: flex; background: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
      #toolbar { display: flex; gap: 6px; align-items: stretch; background: rgba(0, 0, 0, 0.7); padding: 8px 12px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
      .tool { color: white; cursor: pointer; padding: 6px 4px; border: 1px solid transparent; border-radius: 6px; user-select: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 4px; width: 62px; min-height: 62px; text-align: center; font-size: 11px; transition: background 0.15s, border-color 0.15s; box-sizing: border-box; }
      .tool:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
      .tool.selected { border-color: #fbbf24; background: rgba(251,191,36,0.22); color: #fde68a; }
      .tool-name { line-height: 1.2; }
      .tool-icon { flex: 1; display: flex; align-items: center; justify-content: center; }
      .separator { width: 1px; background: rgba(255, 255, 255, 0.3); margin: 0 4px; align-self: stretch; }
      
      #request-popup {
        position: absolute;
        display: none;
        background: rgba(0, 0, 0, 0.85);
        color: white;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #444;
        font-family: sans-serif;
        pointer-events: none;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        max-width: 250px;
      }
      #request-popup h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
        color: #44ff44;
        border-bottom: 1px solid #444;
        padding-bottom: 4px;
      }
      #request-popup .prop {
        font-size: 13px;
        margin: 4px 0;
        display: flex;
        justify-content: space-between;
      }
      #request-popup .prop-label {
        color: #aaa;
        margin-right: 12px;
      }
      #request-popup .color-swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin-right: 6px;
        border: 1px solid #fff;
        vertical-align: middle;
      }
      #request-popup .reward-info {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid #444;
        font-weight: bold;
      }

      /* Sorter configuration dialog */
      #sorter-dialog {
        position: absolute;
        background: rgba(20, 20, 30, 0.95);
        color: #eee;
        border: 1px solid #557;
        border-radius: 8px;
        padding: 0;
        z-index: 2000;
        min-width: 240px;
        box-shadow: 0 6px 24px rgba(0,0,0,0.6);
        font-family: sans-serif;
        font-size: 14px;
      }
      #sorter-dialog .sorter-dialog-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: rgba(85, 136, 221, 0.3);
        border-radius: 8px 8px 0 0;
        border-bottom: 1px solid #446;
        font-weight: bold;
      }
      #sorter-dialog-close {
        background: none;
        border: none;
        color: #aaa;
        font-size: 18px;
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
      }
      #sorter-dialog-close:hover { color: #fff; }
      #sorter-dialog .sorter-dialog-body {
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #sorter-dialog label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        color: #aaa;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      #sorter-dialog select {
        background: #1e1e2e;
        color: #eee;
        border: 1px solid #446;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 14px;
        cursor: pointer;
      }
      #sorter-clear-btn {
        background: rgba(255, 80, 80, 0.15);
        color: #ff8888;
        border: 1px solid #884;
        border-radius: 4px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 13px;
      }
      #sorter-clear-btn:hover { background: rgba(255, 80, 80, 0.3); }

      /* Request Repository Panel */
      #request-repository {
        position: absolute;
        top: 0;
        right: 0;
        width: 250px;
        height: 100%;
        background: rgba(30, 30, 40, 0.9);
        border-left: 1px solid #445;
        color: #eee;
        display: flex;
        flex-direction: column;
        z-index: 50;
        box-shadow: -4px 0 15px rgba(0,0,0,0.3);
      }
      #request-repository-header {
        padding: 15px;
        background: rgba(50, 50, 70, 0.5);
        border-bottom: 1px solid #445;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #request-repository-header h2 {
        margin: 0;
        font-size: 16px;
        color: #88ccff;
      }
      #new-request-btn {
        background: #44aa44;
        color: white;
        border: none;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
      }
      #new-request-btn:hover { background: #55bb55; }
      #request-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .repo-request-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #445;
        border-radius: 6px;
        padding: 10px;
        font-size: 13px;
        transition: background 0.2s, border-color 0.2s;
        cursor: default;
      }
      .repo-request-card:hover { 
        background: rgba(255, 255, 255, 0.08); 
        border-color: #667;
      }
      .repo-request-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
        gap: 8px;
      }
      .repo-request-name { 
        font-weight: bold; 
        color: #88ff88; 
        flex: 1;
        font-size: 14px;
        line-height: 1.2;
      }
      .repo-request-visuals {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 80px;
      }
      .repo-swatch {
        width: 14px;
        height: 14px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 2px;
      }
      .repo-shape {
        width: 14px;
        height: 14px;
        background: #ccc;
        position: relative;
      }
      .repo-shape-circle { border-radius: 50%; }
      .repo-shape-triangle {
        background: none;
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-bottom: 14px solid #ccc;
      }
      .repo-shape-square { border-radius: 0; }
      .repo-shape-any {
        background: none;
        border: 1px dashed #666;
        border-radius: 50%;
      }
      .repo-size {
        width: 14px;
        height: 14px;
        border: 1px solid #aaa;
        background: rgba(255,255,255,0.1);
      }
      .repo-request-reward { 
        font-weight: bold; 
        color: #ffcc44; 
        font-size: 11px;
        border-top: 1px solid rgba(255,255,255,0.05);
        padding-top: 6px;
        display: flex;
        justify-content: space-between;
      }

      /* Receiver Dialog (Selection) */
      .receiver-dialog-item {
        padding: 8px 12px;
        border-bottom: 1px solid #334;
        cursor: pointer;
      }
      .receiver-dialog-item:hover { background: rgba(255, 255, 255, 0.1); }
      .receiver-dialog-item.selected { background: rgba(85, 136, 221, 0.2); border-left: 3px solid #5588dd; }

      .emitter-sequence-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 260px;
        overflow-y: auto;
      }
      .emitter-sequence-controls {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 10px;
      }
      .emitter-loop-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #cbd5e1;
        font-size: 13px;
        text-transform: none;
      }
      .emitter-random-controls {
        display: flex;
        align-items: end;
        gap: 8px;
      }
      .emitter-random-controls input {
        width: 70px;
      }
      .emitter-sequence-row {
        display: grid;
        grid-template-columns: 38px 1fr 1fr 1fr auto;
        gap: 8px;
        align-items: end;
        padding: 8px;
        border: 1px solid #334;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
      }
      .emitter-sequence-index {
        color: #88ccff;
        font-size: 12px;
        align-self: center;
      }
      .emitter-sequence-actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .emitter-sequence-actions button {
        padding: 4px 8px;
        font-size: 12px;
      }
      .emitter-sequence-footer {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <svg id="app">
      <g id="grid"></g>
      <g id="world"></g>
    </svg>
    <div id="hud">Money: $0 | Tick: 0</div>
    <div id="request-popup"></div>
    <div id="request-repository">
      <div id="request-repository-header">
        <h2>Requests</h2>
        <button id="new-request-btn">NEW</button>
      </div>
      <div id="request-list">
        <!-- Generated requests go here -->
      </div>
    </div>
    <div id="menu-container">
      <div id="pause-menu">
        <div class="tool" id="pause-btn">
          <span class="tool-name" id="pause-btn-label">Pause</span>
          <div class="tool-icon"><img id="pause-btn-icon" src="/icons/pause-button.svg" width="38" height="38" style="pointer-events:none" /></div>
        </div>
      </div>
      <div id="toolbar">
        <div class="tool" data-type="emitter">Emitter</div>
        <div class="tool" data-type="belt">Belt</div>
        <div class="tool" data-type="receiver">Receiver</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
